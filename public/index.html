<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>د. روز للورد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(160deg, #c63c78 0%, #7a1040 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 20px;
      color: #fff;
    }

    .logo img {
      width: 200px;
      height: auto;
      margin-bottom: 28px;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.2));
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    p {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      max-width: 320px;
      margin: 0 auto 36px;
    }

    .btn {
      display: inline-block;
      padding: 16px 48px;
      background: #fff;
      color: #c63c78;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 800;
      font-family: 'Tajawal', sans-serif;
      text-decoration: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="logo.png" alt="Dr Rose" />
  </div>

  <h1>بطاقة الولاء<br/>د. روز للورد 🌹</h1>
  <p>سجّلي واحصلي على بطاقتك الرقمية — خصم 50% بعد كل 5 زيارات</p>

  <a href="register.html" class="btn">سجّلي الآن</a>

  <div class="footer">drrsoe-sa.com</div>

</body>
</html>
