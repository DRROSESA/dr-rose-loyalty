<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>د. روز للورد — بطاقة الولاء</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(160deg, #c63c78 0%, #8b1a4a 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      padding: 36px 28px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-circle {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #c63c78, #ff89b5);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 12px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #c63c78;
      line-height: 1.3;
    }
    .logo p {
      font-size: 13px;
      color: #999;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 7px;
    }
    input, select {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      background: #fafafa;
      color: #222;
      direction: rtl;
    }
    input:focus, select:focus {
      border-color: #c63c78;
      background: #fff;
    }
    input.error { border-color: #e53935; }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #c63c78, #e05090);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .msg.error   { background: #ffebee; color: #c62828; display: block; }

    /* شاشة النجاح */
    .success-screen {
      display: none;
      text-align: center;
    }
    .success-screen .checkmark {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .success-screen h2 {
      font-size: 22px;
      font-weight: 700;
      color: #2e7d32;
      margin-bottom: 8px;
    }
    .success-screen p {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .btn-apple {
      width: 100%;
      padding: 15px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn-apple svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

    .customer-number {
      background: #fce4ec;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 15px;
      color: #880e4f;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- فورم التسجيل -->
  <div id="form-section">
    <div class="logo">
      <div class="logo-circle">🌹</div>
      <h1>د. روز للورد</h1>
      <p>سجّل للحصول على بطاقة الولاء</p>
    </div>

    <div class="form-group">
      <label for="name">الاسم الكامل</label>
      <input type="text" id="name" placeholder="مثال: سارة المطيري" autocomplete="name" />
    </div>

    <div class="form-group">
      <label for="phone">رقم الجوال</label>
      <input type="tel" id="phone" placeholder="05xxxxxxxx" autocomplete="tel" inputmode="numeric" maxlength="10" />
    </div>

    <div class="form-group">
      <label for="city">المدينة</label>
      <select id="city">
        <option value="">اختر مدينتك</option>
        <option value="الرياض">الرياض</option>
        <option value="جدة">جدة</option>
        <option value="الدمام">الدمام</option>
        <option value="الاحساء">الاحساء</option>
        <option value="الخبر">الخبر</option>
        <option value="مكة المكرمة">مكة المكرمة</option>
        <option value="المدينة المنورة">المدينة المنورة</option>
        <option value="أخرى">أخرى</option>
      </select>
    </div>

    <button class="btn" id="submit-btn" onclick="register()">تسجيل وتحميل البطاقة</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- شاشة النجاح -->
  <div class="success-screen" id="success-section">
    <div class="checkmark">🎉</div>
    <h2>أهلاً بك!</h2>
    <p id="success-name"></p>
    <div class="customer-number" id="customer-number-box"></div>
    <a id="apple-btn" class="btn-apple" href="#" onclick="downloadPass(event)">
      <svg viewBox="0 0 814 1000"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 336.8 17 189.7 17 100.8c0-60.9 10.9-120.4 33.3-173.7 24.7-59.7 65.8-113.4 116.4-151.5C222.6 2.7 278.9-16 337.5-16c81.2 0 144.2 51.1 192 51.1 46.4 0 119.2-54.2 208.6-54.2zm21.5-94.9c-9.4 41.8-28.1 83.7-59.7 119.5-37.5 41.8-82.8 70.4-132 64.3-.6-4.5-.8-9-0.8-13.5 0-37.5 12.5-77.7 38.9-113.2 26.2-35.3 68.7-66.2 113.8-83.6 4.5 8.9 8.9 19.6 8.9 26.5 0 .8.9 3 9.9 0z"/></svg>
      إضافة إلى Apple Wallet
    </a>
    <button class="btn" style="background:#666;margin-top:0" onclick="location.reload()">تسجيل عميل آخر</button>
  </div>

</div>

<script>
const API = 'https://dr-rose-loyalty-production.up.railway.app';
let registeredPhone = '';
let registeredNumber = '';

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function setLoading(on) {
  const btn = document.getElementById('submit-btn');
  btn.disabled = on;
  btn.textContent = on ? 'جاري التسجيل...' : 'تسجيل وتحميل البطاقة';
}

async function register() {
  const name  = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const city  = document.getElementById('city').value;

  // تحقق بسيط
  if (!name) { showMsg('يرجى إدخال الاسم', 'error'); return; }
  if (!/^05\d{8}$/.test(phone)) { showMsg('رقم الجوال يجب أن يبدأ بـ 05 ويكون 10 أرقام', 'error'); return; }

  setLoading(true);
  showMsg('', '');

  try {
    // تحقق هل مسجّل مسبقاً
    const checkRes = await fetch(`${API}/check-customer/${phone}`);
    const checkData = await checkRes.json();

    if (checkData.exists) {
      registeredPhone = phone;
      registeredNumber = checkData.customer.customer_number;
      showSuccess(checkData.customer.name, checkData.customer.customer_number, true);
      return;
    }

    // تسجيل جديد
    const res = await fetch(`${API}/customer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, city })
    });
    const data = await res.json();

    if (!res.ok) {
      showMsg(data.error || 'حدث خطأ، يرجى المحاولة مجدداً', 'error');
      return;
    }

    registeredPhone = phone;
    registeredNumber = data.customer_number;
    showSuccess(name, data.customer_number, false);

  } catch (err) {
    showMsg('تعذّر الاتصال بالسيرفر، تحقق من الإنترنت', 'error');
  } finally {
    setLoading(false);
  }
}

function showSuccess(name, number, existing) {
  document.getElementById('form-section').style.display = 'none';
  const sec = document.getElementById('success-section');
  sec.style.display = 'block';

  document.getElementById('success-name').textContent = existing
    ? `مرحباً بعودتك ${name}! بطاقتك جاهزة.`
    : `تم تسجيلك بنجاح يا ${name}! بطاقتك جاهزة للتحميل.`;

  document.getElementById('customer-number-box').textContent = `رقم بطاقتك: ${number}`;
}

function downloadPass(e) {
  e.preventDefault();
  window.location.href = `${API}/pass/${registeredPhone}`;
}

// إدخال الجوال — أرقام فقط
document.getElementById('phone').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '');
});
</script>
</body>
</html>
